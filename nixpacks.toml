[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmd = "npm i -g corepack@latest && corepack enable && corepack prepare --activate && pnpm install --frozen-lockfile"

[phases.build]
cmd = "cd apps/api && npx prisma generate && cd ../.. && pnpm --filter api build"

[start]
cmd = "node apps/api/dist/src/main.js"
