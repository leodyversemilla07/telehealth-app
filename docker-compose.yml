# ── Production docker-compose for AWS Elastic Beanstalk ──
# API only — Web is deployed on Vercel, Proxy not needed
# Pre-built image in ECR. Env vars via EB environment properties.

services:
  api:
    image: 341738837383.dkr.ecr.us-east-1.amazonaws.com/telehealth-api:latest
    container_name: telehealth-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    ports:
      - "3001:3001"
    restart: unless-stopped
