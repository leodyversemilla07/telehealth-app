# ── Production docker-compose for AWS Elastic Beanstalk ──
# API only — Web is deployed on Vercel, Proxy not needed
# Pre-built image in ECR. Env vars via EB environment properties.

services:
  api:
    image: 341738837383.dkr.ecr.us-east-1.amazonaws.com/telehealth-api:latest
    container_name: telehealth-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SESSION_EXPIRY_SECONDS: ${SESSION_EXPIRY_SECONDS:-604800}
      NIM_API_KEY: ${NIM_API_KEY}
      RETENTION_NOTIFICATIONS_DAYS: ${RETENTION_NOTIFICATIONS_DAYS:-90}
      RETENTION_SECURITY_ALERTS_DAYS: ${RETENTION_SECURITY_ALERTS_DAYS:-730}
      RETENTION_AUDIT_LOGS_DAYS: ${RETENTION_AUDIT_LOGS_DAYS:-2555}
    ports:
      - "3001:3001"
    restart: unless-stopped
