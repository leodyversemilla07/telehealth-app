# ── Production docker-compose for AWS Elastic Beanstalk ──
# Pre-built images in ECR — no on-instance Docker build needed.
# Environment variables are passed via EB environment properties.

services:
  api:
    image: 341738837383.dkr.ecr.us-east-1.amazonaws.com/telehealth-api:latest
    container_name: telehealth-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    expose:
      - "3001"
    restart: unless-stopped

  web:
    image: 341738837383.dkr.ecr.us-east-1.amazonaws.com/telehealth-web:latest
    container_name: telehealth-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "/api"
    expose:
      - "3000"
    depends_on:
      - api
    restart: unless-stopped

  proxy:
    image: 341738837383.dkr.ecr.us-east-1.amazonaws.com/telehealth-proxy:latest
    container_name: telehealth-proxy
    ports:
      - "80:80"
    volumes:
      - "/var/log/nginx:/var/log/nginx"
    depends_on:
      - api
      - web
    restart: unless-stopped
