# Telehealth App — local development infrastructure
#
# Provides PostgreSQL for local development. The API and web run via `pnpm dev`.
# Credentials below match apps/api/.env.example (DATABASE_URL), so a fresh clone
# works after `cp apps/api/.env.example apps/api/.env`.
#
#   docker compose up -d postgres     # start the database
#   docker compose down -v            # stop and remove the volume

services:
  postgres:
    image: postgres:16
    container_name: telehealth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: johndoe
      POSTGRES_PASSWORD: randompassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U johndoe -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
