# =============================================================================
# Telehealth App — Production Docker Compose (AWS Elastic Beanstalk)
# =============================================================================
# Full stack: Nginx proxy + API + Web
# Pre-built images from ECR. Env vars via EB environment properties.

services:
  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: telehealth-nginx
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── NestJS API ──────────────────────────────────────────────────────────
  api:
    image: ${ECR_REGISTRY}/telehealth-api:latest
    container_name: telehealth-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      EMAIL_FROM: ${EMAIL_FROM}
      SMTP_ENDPOINT: ${SMTP_ENDPOINT}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      SESSION_EXPIRY_SECONDS: ${SESSION_EXPIRY_SECONDS:-604800}
      NIM_API_KEY: ${NIM_API_KEY}
      RETENTION_NOTIFICATIONS_DAYS: ${RETENTION_NOTIFICATIONS_DAYS:-90}
      RETENTION_SECURITY_ALERTS_DAYS: ${RETENTION_SECURITY_ALERTS_DAYS:-730}
      RETENTION_AUDIT_LOGS_DAYS: ${RETENTION_AUDIT_LOGS_DAYS:-2555}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Next.js Web App ─────────────────────────────────────────────────────
  web:
    image: ${ECR_REGISTRY}/telehealth-web:latest
    container_name: telehealth-web
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_VAPID_KEY: ${NEXT_PUBLIC_VAPID_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
