name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11.4.0'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Quality Checks (run on all pushes and PRs)
  # ─────────────────────────────────────────────────────────────
  quality:
    name: 🔍 Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

  # ─────────────────────────────────────────────────────────────
  # API Tests
  # ─────────────────────────────────────────────────────────────
  api-tests:
    name: 🧪 API Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb?schema=public
      BETTER_AUTH_SECRET: test-secret-that-is-at-least-32-characters-long
      BETTER_AUTH_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api exec prisma generate

      - name: Run migrations
        run: pnpm --filter api exec prisma migrate deploy

      - name: Run tests
        run: pnpm --filter api test

      - name: Build API
        run: pnpm --filter api build

  # ─────────────────────────────────────────────────────────────
  # Web Tests
  # ─────────────────────────────────────────────────────────────
  web-tests:
    name: 🧪 Web Tests
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @workspace/shared build

      - name: Run tests
        run: pnpm --filter web test

      - name: Build Web
        run: pnpm --filter web... build

  # ─────────────────────────────────────────────────────────────
  # Deploy to EC2 (only on push to main)
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: [api-tests, web-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/telehealth-app
            
            # Pull latest changes
            git pull origin main
            
            # Install dependencies
            pnpm install --frozen-lockfile
            
            # Build workspace dependencies
            pnpm --filter @workspace/shared build
            
            # Build API
            pnpm --filter api build
            
            # Build Web (standalone mode)
            pnpm --filter web build
            
            # Copy static files for standalone
            cp -r apps/web/public apps/web/.next/standalone/apps/web/
            cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/
            
            # Restart services
            pm2 restart telehealth-api telehealth-web
            
            echo "✅ Deployment complete!"
