# ── Local development overrides ──
# Docker Compose auto-merges this file on top of docker-compose.yml.
# This file is EXCLUDED from EB deployment via .ebignore.
# Run `docker compose up` locally to get postgres + dev env vars.

services:
  postgres:
    image: postgres:16-alpine
    container_name: telehealth-app-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-johndoe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-randompassword}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-johndoe} -d ${POSTGRES_DB:-mydb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-net

  api:
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:***@postgres:5432/${POSTGRES_DB:-mydb}
      CORS_ORIGIN: http://localhost:3000
      BETTER_AUTH_URL: http://localhost:3001
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-development-secret-change-me-32}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  web:
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    networks:
      - app-net

  # Disable proxy in local dev — use direct ports instead
  proxy:
    ports: []
    entrypoint: ["echo", "Proxy disabled in local dev"]

networks:
  app-net:
    driver: bridge

volumes:
  pgdata:
